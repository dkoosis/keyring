name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      # Contract tests only — stub `security`, no live-keychain claims.
      # The live e2e (KEYRING_LIVE_E2E=1) is a manual, interactive gate.
      - run: go test ./...
